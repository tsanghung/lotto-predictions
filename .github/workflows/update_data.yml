name: Daily Lotto Data Update

on:
  schedule:
    # 台灣時間 21:30 相當於 UTC 13:30
    - cron: '30 13 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 需要寫入權限才能 commit & push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # 快取 pip 依賴以加速執行

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Latest Lotto Data
        env:
          PYTHONPATH: src
        run: |
          python -m src.scraper.update_latest

      - name: Sync with Official NTA API (Auto-Reconciliation)
        env:
          PYTHONPATH: src
        run: |
          python -m src.scraper.official_sync

      - name: Evaluate Predictions & Scientific Attribution
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONPATH: src
        run: |
          python -m src.analyzer.evaluator

      - name: Check for Changes and Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 檢查是否有檔案變動
          if [ -n "$(git status --porcelain)" ]; then
            echo "Changes detected, committing updates..."
            git add data/*.json
            git commit -m "Auto-update: Sync with Official NTA API & Latest Results [skip ci]"
            git push
          else
            echo "No new data to commit."
          fi
